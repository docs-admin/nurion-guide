name: publish site
on:
  push:
    branches:
      - main  # main 브랜치에 push될 때마다 실행

permissions:
  contents: write
env: 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
      - run: pip install mkdocs-material mkdocs-awesome-pages-plugin mkdocs-obsidian-support
      - run: mkdocs gh-deploy --force 
