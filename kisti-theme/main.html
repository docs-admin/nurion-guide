{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    /* 메뉴가 들어갈 컨테이너 스타일 */
    .custom-header-nav {
      display: flex;
      gap: 1.5rem;
      margin-left: 1rem;
      margin-right: 2rem;
      align-items: center;
    }
    /* 개별 링크 스타일 */
    .custom-nav-link {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--md-header-fg-color);
      text-decoration: none;      
      transition: opacity 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .custom-nav-link:hover {
      opacity: 1;
      text-decoration: underline;
    }
    /* 화면이 좁아지면 메뉴 숨기기 (모바일 대응) */
    @media screen and (max-width: 60em) {
      .custom-header-nav { display: none; }
    }
    /* 요약 페이지 전용 카드 스타일 */
    .summary-container ul {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      list-style: none;
      padding: 0;
    }

    .summary-container ul li a {
      display: block;
      padding: 5px 5px 5px 20px;
      border: 1px solid var(--md-typeset-table-color);
      border-radius: 8px;      
      font-weight: bold;
      font-size: small;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }

    .summary-container ul li a:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      background-color: var(--md-code-bg-color);      
      opacity: 0.7;
      text-decoration: none;
    }

  </style>
{% endblock %}

{% block header %}
  {{ super() }}
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // 1. 타이틀 영역을 찾습니다.
      var titleElement = document.querySelector(".md-header__title");
      
      if (titleElement && !document.querySelector(".custom-header-nav")) {
        // 2. 메뉴 컨테이너 생성
        var navContainer = document.createElement("div");
        navContainer.className = "custom-header-nav";
        navContainer.innerHTML = `
          <a href="https://site-a.com" class="custom-nav-link">초보 사용자 가이드</a>
          <a href="https://site-a.com" class="custom-nav-link">누리온 지침서</a>
          <a href="https://site-a.com" class="custom-nav-link">뉴론 지침서</a>
          <a href="https://site-a.com" class="custom-nav-link">활용 정보 </a>
          <a href="https://site-a.com" class="custom-nav-link">MyKSC 지침서 </a>
        `;
        
        // 3. 타이틀 영역 바로 뒤에 삽입
        titleElement.after(navContainer);
      }
    });
  </script>
{% endblock %}
