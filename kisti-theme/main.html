{% extends "base.html" %}

{% block header %}
  {{ super() }} 

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var headerInner = document.querySelector(".md-header__title");
      var searchElement = document.querySelector(".md-search");
      
      if (headerInner && searchElement) {
        var navContainer = document.createElement("div");
        navContainer.className = "custom-header-nav";
        navContainer.innerHTML = `
          <a href="https://site-a.com" class="custom-nav-link">SiteA</a>
          <a href="https://site-b.com" class="custom-nav-link">SiteB</a>
        `;
        // 로고와 검색창 사이에 삽입
        headerInner.insertBefore(navContainer, searchElement);
      }
    });
  </script>

<!-- 
  <div class="custom-header-nav">
    <a href="https://site-a.com" class="custom-nav-link">SiteA</a>
    <a href="https://site-b.com" class="custom-nav-link">SiteB</a>
  </div> -->

  <style>
    .custom-header-nav {
      position: absolute;
      left: 10rem; /* 로고 위치에 따라 조정 */
      display: flex;
      gap: 15px;
      z-index: 1;
    }
    .custom-nav-link {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--md-header-fg-color);
      text-decoration: none;
    }
    @media screen and (max-width: 45em) {
      .custom-header-nav { display: none; }
    }
  </style>
{% endblock %}
