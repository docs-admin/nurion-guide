{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    /* 헤더 링크 스타일 정의 */
    .custom-header-links {
      display: flex;
      gap: 1.2rem;
      margin: 0 1rem;
      align-items: center;
      flex-grow: 1; /* 검색창 밀어내기 조절 */
    }
    .custom-nav-link {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--md-header-fg-color);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .custom-nav-link:hover {
      opacity: 1;
      text-decoration: underline;
      color: var(--md-header-fg-color);
    }
    /* 모바일 환경(태블릿 미만)에서는 공간 부족으로 숨김 */
    @media screen and (max-width: 60em) {
      .custom-header-links { display: none; }
    }
  </style>
{% endblock %}

{% block header %}
  {{ super() }}
   <br><br><h1>asfasdfasd</h1>     
{% endblock %}
