{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    .custom-header-links {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-left: 1rem;
    }
    .custom-nav-link {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--md-header-fg-color);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .custom-nav-link:hover { opacity: 1; text-decoration: underline; }
    @media screen and (max-width: 45em) { .custom-header-links { display: none; } }
  </style>
{% endblock %}

{% block header %}
  {{ super() }}
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var headerInner = document.querySelector(".md-header__inner");
      var searchElement = document.querySelector(".md-header__search");
      if (headerInner && searchElement) {
        var navContainer = document.createElement("div");
        navContainer.className = "custom-header-links";
        navContainer.innerHTML = `
          <a href="https://site-a.com" class="custom-nav-link">SiteA</a>
          <a href="https://site-b.com" class="custom-nav-link">SiteB</a>
        `;
        headerInner.insertBefore(navContainer, searchElement);
      }
    });
  </script>
{% endblock %}
