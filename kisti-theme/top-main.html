{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    /* 로고 옆 메뉴 스타일 */
    .md-header__title {
      display: flex !important;
      align-items: center;
      flex-grow: 1;
    }
    .custom-header-links {
      display: flex;
      margin-left: 1.5rem; /* 로고/제목과의 간격 */
      gap: 1.2rem;         /* 메뉴 간 간격 */
    }
    .custom-nav-link {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--md-header-fg-color);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .custom-nav-link:hover {
      opacity: 1;
      text-decoration: underline;
    }
    /* 화면이 좁아지면(모바일) 메뉴 숨기기 */
    @media screen and (max-width: 60em) {
      .custom-header-links {
        display: none;
      }
    }
  </style>
{% endblock %}

{% block header_title %}
  {{ super() }}
  <div class="custom-header-links">
    <a href="https://site-a.com" class="custom-nav-link">SiteA</a>
    <a href="https://site-b.com" class="custom-nav-link">SiteB</a>
  </div>
{% endblock %}
